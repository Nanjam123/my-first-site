<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一个网站</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .box {
            background: rgba(255,255,255,0.15);
            padding: 50px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 48px; margin-bottom: 10px; }
        p { font-size: 20px; opacity: 0.9; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: white;
            color: #764ba2;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 我的第一个网站</h1>
        <p>不花一分钱，10分钟搞定！</p>
        <a href="#" class="btn">点我试试</a>
    </div>
</body>
</html>
